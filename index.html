<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Love</title>
  <!-- Bold modern font similar to your reference -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Intro Section -->
  <div class="intro">
    <h1 class="fade-title">OUR LOVE</h1>
  </div>

  <!-- First Section -->
  <div class="section">
    <img src="1stpic.jpeg" class="left-img" alt="Us together">
    <div class="right-text">
      <h2>Month 1 – The Beginning</h2>
      <p>Our first laughs, our first calls — everything felt new and perfect.</p>
    </div>
  </div>

  <!-- JavaScript for scroll fade-in -->
  <script>
    window.addEventListener('scroll', function() {
      const img = document.querySelector('.left-img');
      const text = document.querySelector('.right-text');
      const rect = img.getBoundingClientRect();
      if (rect.top < window.innerHeight) {
        img.classList.add('visible');
        text.classList.add('visible');
      }
    });
  </script>
</body>
</html>
